name: Build and Push SteamAndGears OS

on:
  push:
    branches: [ "main" ]
  # Permite executar o workflow manualmente no separador "Actions"
  workflow_dispatch:
  # Reconstrói a imagem automaticamente uma vez por semana (domingos à meia-noite)
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Permissões necessárias para o GitHub publicar no GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Iniciar sessão no GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # O GitHub fornece este token automaticamente, não precisas de configurar nada!
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir a imagem Bootc com Podman
        run: |
          podman build -t ghcr.io/dogo7777/steamandgears:latest .

      - name: Publicar a imagem no GHCR
        run: |
          podman push ghcr.io/dogo7777/steamandgears:latest
